name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          check_together: true
          scandir: .
          version: v0.10.0

  macos:
    name: Bash 3.2 syntax and behavior tests
    needs: shellcheck
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Show target Bash
        run: /bin/bash --version

      - name: Check Bash syntax
        run: /bin/bash -n netmon.sh tests/netmon_test.sh

      - name: Run deterministic behavior tests
        run: /bin/bash tests/netmon_test.sh

      - name: Verify the checkout stayed clean
        run: git diff --exit-code
